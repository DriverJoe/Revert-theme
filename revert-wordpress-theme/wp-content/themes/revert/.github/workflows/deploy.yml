name: Deploy ReVert Theme

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Backup current theme on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "if [ -d /var/www/html/wp-content/themes/revert ]; then \
              BACKUP_DIR=/var/www/html/wp-content/themes/revert-backup-\$(date +%Y%m%d-%H%M%S); \
              cp -r /var/www/html/wp-content/themes/revert \$BACKUP_DIR; \
              echo \"Backup created at \$BACKUP_DIR\"; \
            else \
              echo 'No existing theme found, skipping backup'; \
            fi"

      - name: Deploy theme via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.gitignore' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='tailwind.config.js' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/html/wp-content/themes/revert/

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "ls -la /var/www/html/wp-content/themes/revert/style.css && echo 'Deployment verified successfully'"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
